<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OdoNex | Unified ERP Solutions</title>
    <!-- Google Fonts - Cairo -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #F1F3FD 0%, #E6FAFF 100%);
            min-height: 100vh;
            color: #333333;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 0 40px;
        }

        /* ===== Navigation Bar ===== */
        .navbar {
            background: white;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            height: 70px;
            display: flex;
            align-items: center;
            position: relative;
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        /* Left side - Logo and OdoNex text */
        .nav-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-logo-img {
            height: 40px;
            width: auto;
            object-fit: contain;
        }

        .nav-logo-text {
            font-family: 'Cairo', sans-serif;
            font-size: 18px;
            font-weight: 700;
            color: #000000;
        }

        /* Centered Navigation Menu */
        .nav-menu {
            display: flex;
            gap: 35px;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        .nav-menu a {
            text-decoration: none;
            font-family: 'Cairo', sans-serif;
            font-size: 16px;
            font-weight: 500;
            color: #6B6B6B;
            transition: color 0.3s;
        }

        .nav-menu a:hover,
        .nav-menu a.active {
            color: #7A5AF8;
            font-weight: 600;
        }

        /* Right side - Get Started, Language and Dark Mode */
        .nav-right {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .btn-get-started {
            background: linear-gradient(135deg, #7A5AF8 0%, #2BB0ED 100%);
            color: white;
            font-family: 'Cairo', sans-serif;
            font-size: 14px;
            font-weight: 600;
            padding: 8px 18px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .btn-get-started:hover {
            transform: scale(1.05);
        }

        /* Language Button */
        .lang-container {
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #ddd;
            border-radius: 8px;
            padding: 6px 12px;
            background: transparent;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .lang-container:hover {
            border-color: #7A5AF8;
            transform: scale(1.02);
        }

        .lang-text {
            font-family: 'Cairo', sans-serif;
            font-size: 14px;
            font-weight: 500;
            color: #555;
        }

        /* Dark Mode Toggle */
        .dark-mode-container {
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #ddd;
            border-radius: 8px;
            padding: 6px 12px;
            background: transparent;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .dark-mode-container:hover {
            border-color: #7A5AF8;
            transform: scale(1.02);
        }

        .dark-mode-toggle {
            background: transparent;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: #555;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 300;
            font-family: 'Arial', sans-serif;
        }

        /* ===== Hero Section ===== */
        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            text-align: center;
            margin-top: 90px;
            padding-bottom: 40px;
            min-height: calc(100vh - 70px);
        }

        /* Logo with Bouncing Animation */
        @keyframes gentleBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .hero-logo {
            width: 305px;
            height: auto;
            margin-bottom: 5px;
            filter: drop-shadow(0 12px 18px rgba(122,90,248,0.2));
            animation: gentleBounce 4s ease-in-out infinite;
            object-fit: contain;
        }

        /* Main Headline */
        h1 {
            font-family: 'Cairo', sans-serif;
            font-size: 58px;
            font-weight: 700;
            line-height: 1.2;
            color: #333333;
            margin-bottom: 3px;
            letter-spacing: -0.5px;
        }

        .brand-gradient {
            background: linear-gradient(135deg, #7A5AF8, #2BB0ED);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 700;
            display: inline-block;
        }

        /* Subheadline */
        .subheadline {
            font-family: 'Cairo', sans-serif;
            font-size: 28px;
            font-weight: 700;
            color: #000000;
            letter-spacing: 0.5px;
            margin-bottom: 3px;
        }

        /* Description */
        .description {
            font-family: 'Cairo', sans-serif;
            font-size: 20px;
            font-weight: 400;
            line-height: 1.5;
            color: #8A8A8A;
            max-width: 900px;
            margin: 0 auto 5px;
        }

        /* CTA Buttons */
        .cta-buttons {
            display: flex;
            gap: 16px;
            justify-content: center;
            align-items: center;
            width: 100%;
            max-width: 700px;
            margin: 3px auto 0;
        }

        .btn-primary {
            background: linear-gradient(135deg, #7A5AF8 0%, #2BB0ED 100%);
            color: white;
            font-family: 'Cairo', sans-serif;
            font-size: 16px;
            font-weight: 600;
            padding: 11px 26px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            box-shadow: 0 6px 14px rgba(122,90,248,0.2);
            transition: transform 0.3s ease;
            flex: 1;
            max-width: 220px;
        }

        .btn-primary:hover {
            transform: scale(1.05);
        }

        .btn-secondary {
            background: transparent;
            border: 2px solid #7A5AF8;
            color: #7A5AF8;
            font-family: 'Cairo', sans-serif;
            font-size: 16px;
            font-weight: 600;
            padding: 11px 26px;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.3s ease;
            flex: 1;
            max-width: 220px;
        }

        .btn-secondary:hover {
            transform: scale(1.05);
        }

        /* ===== Dark Mode Styles ===== */
        body.dark-mode {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #f0f0f0;
        }

        body.dark-mode .navbar {
            background: #222;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }

        body.dark-mode .nav-menu a {
            color: #ccc;
        }

        body.dark-mode .nav-menu a:hover,
        body.dark-mode .nav-menu a.active {
            color: #9B59FF;
        }

        body.dark-mode .lang-container {
            border-color: #444;
        }

        body.dark-mode .lang-text {
            color: #ddd;
        }

        body.dark-mode .dark-mode-container {
            border-color: #444;
        }

        body.dark-mode .dark-mode-toggle {
            color: #fff;
        }

        body.dark-mode .nav-logo-text {
            color: #ffffff;
        }

        body.dark-mode .btn-get-started {
            background: linear-gradient(135deg, #9B59FF, #2BB0ED);
        }

        body.dark-mode h1 {
            color: #f0f0f0;
        }

        body.dark-mode .subheadline {
            color: #ffffff;
        }

        body.dark-mode .description {
            color: #aaa;
        }

        /* ===== Responsive ===== */
        @media (max-width: 992px) {
            .nav-menu {
                position: static;
                transform: none;
                margin: 0 auto;
                gap: 25px;
            }
            
            .nav-container {
                flex-wrap: wrap;
                justify-content: center;
                gap: 15px;
            }
            
            h1 {
                font-size: 48px;
            }
            
            .hero-logo {
                width: 250px;
            }
            
            .cta-buttons {
                max-width: 90%;
            }
            
            .hero {
                margin-top: 70px;
            }
        }

        @media (max-width: 768px) {
            .nav-menu {
                gap: 20px;
                flex-wrap: wrap;
                justify-content: center;
            }
            
            .hero {
                margin-top: 60px;
            }
            
            h1 {
                font-size: 42px;
            }
            
            .subheadline {
                font-size: 24px;
            }
            
            .description {
                font-size: 18px;
                margin-bottom: 4px;
            }
            
            .hero-logo {
                width: 200px;
            }
            
            .cta-buttons {
                flex-direction: column;
                gap: 10px;
                margin-top: 2px;
            }
            
            .btn-primary,
            .btn-secondary,
            .btn-get-started {
                max-width: 100%;
                width: 100%;
                padding: 10px 20px;
                font-size: 15px;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container nav-container">
            <!-- Left side - Logo Image and OdoNex Text -->
            <div class="nav-left">
                <img src="assets/images/odonex-logo.png.png" alt="OdoNex Logo" class="nav-logo-img">
                <span class="nav-logo-text">OdoNex</span>
            </div>

            <!-- Centered Navigation Menu - Exactly as in the image -->
            <div class="nav-menu">
                <a href="#" class="active">Home</a>
                <a href="#">Features</a>
                <a href="#">Pricing</a>
                <a href="#">Portfolio</a>
                <a href="#">Contact</a>
            </div>

            <!-- Right side - Get Started, Language and Dark Mode -->
            <div class="nav-right">
                <button class="btn-get-started">Get Started</button>
                <div class="lang-container" onclick="switchLanguage()">
                    <span class="lang-text">عربي</span>
                </div>
                <div class="dark-mode-container" onclick="toggleDarkMode()">
                    <span class="dark-mode-toggle">☾</span>
                </div>
            </div>
        </div>
    </nav>

    <main class="hero">
        <div class="container" style="display: flex; flex-direction: column; align-items: center;">
            <!-- Main Logo -->
            <img src="assets/images/odonex-logo.png.png" alt="OdoNex Logo" class="hero-logo">

            <!-- Main Headline - Exactly as in the image -->
            <h1>
                <span class="brand-gradient">OdoNex</span> | Unified ERP Solutions
            </h1>

            <!-- Subheadline - Exactly as in the image -->
            <div class="subheadline">
                Integration. Security. Scalability.
            </div>

            <!-- Description - Exactly as in the image with line break -->
            <p class="description">
                A comprehensive accounting system that brings all your business<br>operations into one easy, secure, and scalable platform.
            </p>

            <!-- CTA Buttons - Exactly as in the image -->
            <div class="cta-buttons">
                <button class="btn-primary">Start Free Trial</button>
                <button class="btn-secondary">Request a Demo</button>
            </div>
        </div>
    </main>

    <script>
        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            const toggleBtn = document.querySelector('.dark-mode-toggle');
            if (document.body.classList.contains('dark-mode')) {
                toggleBtn.textContent = '☀️';
            } else {
                toggleBtn.textContent = '☾';
            }
        }

        function switchLanguage() {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
