<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OdoNex | حلول ERP الموحدة</title>
    <!-- Google Fonts - Cairo -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #F1F3FD 0%, #E6FAFF 100%);
            min-height: 100vh;
            color: #333333;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 0 40px;
        }

        /* ===== Navigation Bar ===== */
        .navbar {
            background: white;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            height: 70px;
            display: flex;
            align-items: center;
            position: relative;
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        /* Right side - Logo and OdoNex text */
        .nav-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-logo-img {
            height: 35px;
            width: auto;
        }

        .nav-logo-text {
            font-family: 'Cairo', sans-serif;
            font-size: 18px;
            font-weight: 700;
            color: #000000;
        }

        /* Centered Navigation Menu */
        .nav-menu {
            display: flex;
            gap: 35px;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        .nav-menu a {
            text-decoration: none;
            font-family: 'Cairo', sans-serif;
            font-size: 16px;
            font-weight: 500;
            color: #6B6B6B;
            transition: color 0.3s;
        }

        .nav-menu a:hover,
        .nav-menu a.active {
            color: #7A5AF8;
            font-weight: 600;
        }

        /* Left side - Language and Dark Mode */
        .nav-left {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        /* Language Button with Globe - Outlined */
        .lang-container {
            display: flex;
            align-items: center;
            gap: 4px;
            border: 2px solid #ddd;
            border-radius: 8px;
            padding: 6px 10px;
            background: transparent;
        }

        .lang-text {
            font-family: 'Cairo', sans-serif;
            font-size: 13px;
            font-weight: 500;
            color: #555;
        }

        .globe-icon {
            width: 16px;
            height: 16px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="%23555" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="12" y1="2" x2="12" y2="22"/></svg>');
            background-size: contain;
        }

        /* Dark Mode Toggle - هلال جديد مناسب */
        .dark-mode-container {
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #ddd;
            border-radius: 8px;
            padding: 6px 12px;
            background: transparent;
            cursor: pointer;
        }

        .dark-mode-toggle {
            background: transparent;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: #555;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 300;
            font-family: 'Arial', sans-serif;
        }

        /* ===== Hero Section ===== */
        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start; /* تغيير إلى flex-start لرفع المحتوى */
            text-align: center;
            margin-top: 10px; /* تقليل المسافة العلوية */
            padding-bottom: 40px;
            min-height: calc(100vh - 70px); /* ارتفاع أقل */
        }

        /* Logo with Bouncing Animation - أكبر 10% من الحجم السابق */
        @keyframes gentleBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .hero-logo {
            width: 305px; /* 277px + 10% = 305px */
            height: auto;
            margin-bottom: 8px; /* تقليل المسافة */
            filter: drop-shadow(0 12px 18px rgba(122,90,248,0.2));
            animation: gentleBounce 4s ease-in-out infinite;
        }

        /* Main Headline */
        h1 {
            font-family: 'Cairo', sans-serif;
            font-size: 58px;
            font-weight: 700;
            line-height: 1.2;
            color: #333333;
            margin-bottom: 3px; /* تقليل المسافة */
            letter-spacing: -0.5px;
        }

        .brand-gradient {
            background: linear-gradient(135deg, #7A5AF8, #2BB0ED);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 700;
            display: inline-block;
        }

        /* Subheadline - Bold Black */
        .subheadline {
            font-family: 'Cairo', sans-serif;
            font-size: 28px;
            font-weight: 700;
            color: #000000;
            letter-spacing: 0.5px;
            margin-bottom: 3px; /* تقليل المسافة */
        }

        /* Description - مرفوعة للأعلى جداً */
        .description {
            font-family: 'Cairo', sans-serif;
            font-size: 20px;
            font-weight: 400;
            line-height: 1.5;
            color: #8A8A8A;
            max-width: 900px;
            margin: 0 auto 8px; /* تقليل المسافة */
            white-space: pre-line;
        }

        /* CTA Buttons - أصغر 20% */
        .cta-buttons {
            display: flex;
            gap: 16px; /* تقليل المسافة */
            justify-content: center;
            align-items: center;
            width: 100%;
            max-width: 700px; /* تقليل العرض */
            margin: 5px auto 0; /* تقليل المسافة العلوية */
        }

        .btn-primary {
            background: linear-gradient(135deg, #7A5AF8 0%, #2BB0ED 100%);
            color: white;
            font-family: 'Cairo', sans-serif;
            font-size: 16px; /* تصغير الخط */
            font-weight: 600;
            padding: 11px 26px; /* 14px -20% = 11px, 32px -20% = 26px */
            border-radius: 10px; /* تصغير الانحناء */
            border: none;
            cursor: pointer;
            box-shadow: 0 6px 14px rgba(122,90,248,0.2); /* تقليل الظل */
            transition: transform 0.3s ease;
            flex: 1;
            max-width: 220px; /* تقليل العرض */
        }

        .btn-primary:hover {
            transform: scale(1.05);
        }

        .btn-secondary {
            background: transparent;
            border: 2px solid #7A5AF8;
            color: #7A5AF8;
            font-family: 'Cairo', sans-serif;
            font-size: 16px; /* تصغير الخط */
            font-weight: 600;
            padding: 11px 26px; /* 14px -20% = 11px, 32px -20% = 26px */
            border-radius: 10px; /* تصغير الانحناء */
            cursor: pointer;
            transition: transform 0.3s ease;
            flex: 1;
            max-width: 220px; /* تقليل العرض */
        }

        .btn-secondary:hover {
            transform: scale(1.05);
        }

        /* ===== Dark Mode Styles ===== */
        body.dark-mode {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #f0f0f0;
        }

        body.dark-mode .navbar {
            background: #222;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }

        body.dark-mode .nav-menu a {
            color: #ccc;
        }

        body.dark-mode .nav-menu a:hover,
        body.dark-mode .nav-menu a.active {
            color: #9B59FF;
        }

        body.dark-mode .lang-container {
            border-color: #444;
        }

        body.dark-mode .lang-text {
            color: #ddd;
        }

        body.dark-mode .globe-icon {
            filter: invert(0.8);
        }

        body.dark-mode .dark-mode-container {
            border-color: #444;
        }

        body.dark-mode .dark-mode-toggle {
            color: #fff;
        }

        body.dark-mode .nav-logo-text {
            color: #ffffff;
        }

        body.dark-mode h1 {
            color: #f0f0f0;
        }

        body.dark-mode .subheadline {
            color: #ffffff;
        }

        body.dark-mode .description {
            color: #aaa;
        }

        /* ===== Responsive ===== */
        @media (max-width: 992px) {
            .nav-menu {
                position: static;
                transform: none;
                margin: 0 auto;
                gap: 25px;
            }
            
            .nav-container {
                flex-wrap: wrap;
                justify-content: center;
                gap: 15px;
            }
            
            h1 {
                font-size: 48px;
            }
            
            .hero-logo {
                width: 250px;
            }
            
            .cta-buttons {
                max-width: 90%;
            }
        }

        @media (max-width: 768px) {
            .nav-menu {
                gap: 20px;
                flex-wrap: wrap;
                justify-content: center;
            }
            
            .hero {
                margin-top: 10px;
            }
            
            h1 {
                font-size: 42px;
            }
            
            .subheadline {
                font-size: 24px;
            }
            
            .description {
                font-size: 18px;
                margin-bottom: 6px;
            }
            
            .hero-logo {
                width: 200px;
            }
            
            .cta-buttons {
                flex-direction: column;
                gap: 10px;
                margin-top: 3px;
            }
            
            .btn-primary,
            .btn-secondary {
                max-width: 100%;
                width: 100%;
                padding: 10px 20px;
                font-size: 15px;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container nav-container">
            <!-- Right side - Logo Image and OdoNex Text -->
            <div class="nav-right">
                <img src="assets/images/odonex-logo.png.png" alt="OdoNex" class="nav-logo-img">
                <span class="nav-logo-text">OdoNex</span>
            </div>

            <!-- Centered Navigation Menu -->
            <div class="nav-menu">
                <a href="#" class="active">الرئيسية</a>
                <a href="#">المميزات</a>
                <a href="#">الأسعار</a>
                <a href="#">معرض الأعمال</a>
                <a href="#">اتصل بنا</a>
            </div>

            <!-- Left side - Language and Dark Mode (هلال جديد) -->
            <div class="nav-left">
                <div class="lang-container">
                    <span class="lang-text">EN</span>
                    <div class="globe-icon"></div>
                </div>
                <div class="dark-mode-container" onclick="toggleDarkMode()">
                    <span class="dark-mode-toggle">☾</span> <!-- هلال جديد أكثر نحافة -->
                </div>
            </div>
        </div>
    </nav>

    <main class="hero">
        <div class="container" style="display: flex; flex-direction: column; align-items: center;">
            <!-- Logo Image - أكبر 10% -->
            <img src="assets/images/odonex-logo.png.png" alt="OdoNex" class="hero-logo">

            <!-- Main Headline -->
            <h1>
                <span class="brand-gradient">OdoNex</span> | حلول ERP الموحدة
            </h1>

            <!-- Subheadline -->
            <div class="subheadline">
                تكامل. أمان. توسع.
            </div>

            <!-- Description - مرفوعة للأعلى -->
            <p class="description">
                نظام محاسبي متكامل يجمع جميع عمليات أعمالك في منصة واحدة سهلة
                وآمنة وقابلة للتوسع.
            </p>

            <!-- CTA Buttons - أصغر 20% ومرفوعة للأعلى -->
            <div class="cta-buttons">
                <button class="btn-primary">ابدأ تجربتك المجانية</button>
                <button class="btn-secondary">اطلب عرضاً توضيحياً</button>
            </div>
        </div>
    </main>

    <script>
        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            const toggleBtn = document.querySelector('.dark-mode-toggle');
            if (document.body.classList.contains('dark-mode')) {
                toggleBtn.textContent = '☀️';
            } else {
                toggleBtn.textContent = '☾'; /* هلال جديد أكثر نحافة */
            }
        }
    </script>
</body>
</html>
