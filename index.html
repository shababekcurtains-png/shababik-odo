<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OdoNex | حلول ERP المتكاملة</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #ffffff;
            color: #333333;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 0 40px;
        }

        /* ===== Header ===== */
        header {
            background: white;
            padding: 20px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo img {
            height: 50px;
            width: auto;
        }

        .nav-menu {
            display: flex;
            gap: 40px;
        }

        .nav-menu a {
            text-decoration: none;
            color: #333;
            font-size: 18px;
            font-weight: 500;
        }

        .nav-menu a:hover {
            color: #7B2CBF;
        }

        .lang-en {
            background: none;
            border: 1px solid #ddd;
            padding: 8px 25px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            color: #333;
        }

        /* ===== Hero Section ===== */
        .hero {
            padding: 80px 0;
            text-align: center;
            background: #ffffff;
        }

        .hero h1 {
            font-size: 64px;
            color: #7B2CBF;
            margin-bottom: 20px;
            font-weight: 700;
        }

        .hero-tagline {
            font-size: 28px;
            color: #00B4D8;
            margin-bottom: 25px;
            font-weight: 600;
            letter-spacing: 2px;
        }

        .hero-description {
            font-size: 20px;
            color: #666;
            max-width: 800px;
            margin: 0 auto;
            line-height: 1.8;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <img src="assets/images/odonex-logo.png.png" alt="OdoNex">
                </div>
                <nav class="nav-menu">
                    <a href="#" class="active">الرئيسية</a>
                    <a href="#">المميزات</a>
                    <a href="#">الأسعار</a>
                    <a href="#">معرض الأعمال</a>
                    <a href="#">اتصل بنا</a>
                </nav>
                <button class="lang-en">EN</button>
            </div>
        </div>
    </header>

    <main>
        <section class="hero">
            <div class="container">
                <h1>OdoNex</h1>
                <div class="hero-tagline">كامل. أمان. توسع.</div>
                <p class="hero-description">
                    نظام محاسبي متكامل يجمع جميع عمليات أعمالك في منصة واحدة سهلة وآمنة وقابلة للتوسع.
                </p>
            </div>
        </section>
    </main>
</body>
</html>
