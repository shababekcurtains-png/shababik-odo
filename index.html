<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OdoNex | حلول ERP الموحدة</title>
    <!-- Google Fonts - Tajawal -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', 'Cairo', sans-serif;
            background: linear-gradient(135deg, #F1F3FD 0%, #E6FAFF 100%);
            min-height: 100vh;
            color: #333333;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 0 40px;
        }

        /* ===== Navigation Bar ===== */
        .navbar {
            background: white;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            height: 70px;
            display: flex;
            align-items: center;
            position: relative;
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .nav-menu {
            display: flex;
            gap: 32px;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        .nav-menu a {
            text-decoration: none;
            font-size: 16px;
            font-weight: 500;
            color: #6B6B6B;
            transition: color 0.3s;
        }

        .nav-menu a:hover,
        .nav-menu a.active {
            color: #7A5AF8;
            font-weight: 600;
        }

        .nav-right {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .btn-start-now {
            background: linear-gradient(135deg, #7A5AF8, #2BB0ED);
            color: white;
            font-size: 14px;
            font-weight: 600;
            padding: 10px 18px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            transition: opacity 0.3s;
        }

        .btn-start-now:hover {
            opacity: 0.9;
        }

        .lang-btn {
            background: #F3F4F6;
            border: none;
            color: #555;
            font-size: 14px;
            font-weight: 500;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .lang-btn:hover {
            background: #e5e7eb;
        }

        /* ===== Dark Mode Toggle (Crescent) ===== */
        .dark-mode-toggle {
            background: transparent;
            border: none;
            font-size: 24px;
            cursor: pointer;
            margin-right: 15px;
            color: #7A5AF8;
            transition: transform 0.3s;
        }

        .dark-mode-toggle:hover {
            transform: rotate(15deg);
        }

        /* ===== Hero Section ===== */
        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            margin-top: 80px;
            padding-bottom: 60px;
        }

        /* Logo Area */
        .logo-3d {
            width: 220px;
            height: auto;
            margin-bottom: 30px;
            filter: drop-shadow(0 10px 15px rgba(122,90,248,0.2));
        }

        /* Main Headline */
        h1 {
            font-size: 44px;
            font-weight: 700;
            line-height: 1.4;
            color: #333333;
            margin-bottom: 10px;
        }

        .brand-highlight {
            color: #4A7BFF;
            font-weight: 700;
        }

        /* Subheadline */
        .subheadline {
            font-size: 20px;
            font-weight: 500;
            color: #6A6A6A;
            letter-spacing: 1px;
            margin-bottom: 16px;
        }

        /* Description */
        .description {
            font-size: 16px;
            font-weight: 400;
            line-height: 1.8;
            color: #8A8A8A;
            max-width: 620px;
            margin: 0 auto 30px;
        }

        /* CTA Buttons */
        .cta-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .btn-primary {
            background: linear-gradient(135deg, #7A5AF8 0%, #2BB0ED 100%);
            color: white;
            font-size: 16px;
            font-weight: 600;
            padding: 14px 28px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            box-shadow: 0 8px 18px rgba(122,90,248,0.25);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(122,90,248,0.35);
        }

        .btn-secondary {
            background: transparent;
            border: 2px solid #7A5AF8;
            color: #7A5AF8;
            font-size: 16px;
            font-weight: 600;
            padding: 14px 28px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-secondary:hover {
            background: #7A5AF8;
            color: white;
        }

        /* ===== Dark Mode Styles ===== */
        body.dark-mode {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #f0f0f0;
        }

        body.dark-mode .navbar {
            background: #222;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }

        body.dark-mode .nav-menu a {
            color: #ccc;
        }

        body.dark-mode .nav-menu a:hover,
        body.dark-mode .nav-menu a.active {
            color: #9B59FF;
        }

        body.dark-mode .lang-btn {
            background: #333;
            color: #ddd;
        }

        body.dark-mode .btn-start-now {
            background: linear-gradient(135deg, #9B59FF, #2BB0ED);
        }

        body.dark-mode h1 {
            color: #f0f0f0;
        }

        body.dark-mode .subheadline {
            color: #ccc;
        }

        body.dark-mode .description {
            color: #aaa;
        }

        body.dark-mode .dark-mode-toggle {
            color: #FFD700;
        }

        /* ===== Responsive ===== */
        @media (max-width: 992px) {
            .nav-menu {
                position: static;
                transform: none;
                margin: 0 auto;
            }
            
            .nav-container {
                flex-wrap: wrap;
                justify-content: center;
                gap: 15px;
            }
            
            h1 {
                font-size: 36px;
            }
        }

        @media (max-width: 768px) {
            .nav-menu {
                gap: 20px;
                flex-wrap: wrap;
                justify-content: center;
            }
            
            .hero {
                margin-top: 40px;
            }
            
            .cta-buttons {
                flex-direction: column;
                align-items: center;
            }
            
            .btn-primary,
            .btn-secondary {
                width: 100%;
                max-width: 300px;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container nav-container">
            <!-- Right side (Left in RTL) - Start Now + Language + Dark Mode -->
            <div class="nav-right">
                <button class="btn-start-now">ابدأ الآن</button>
                <button class="lang-btn">EN</button>
                <button class="dark-mode-toggle" onclick="toggleDarkMode()">🌙</button>
            </div>

            <!-- Centered Navigation Menu -->
            <div class="nav-menu">
                <a href="#" class="active">الرئيسية</a>
                <a href="#">المميزات</a>
                <a href="#">الأسعار</a>
                <a href="#">معرض الأعمال</a>
                <a href="#">اتصل بنا</a>
            </div>

            <!-- Left side (Right in RTL) - Logo -->
            <div>
                <!-- شعار OdoNex - 3D Glossy -->
                <img src="assets/images/odonex-logo.png.png" alt="OdoNex" style="height: 40px; width: auto;">
            </div>
        </div>
    </nav>

    <main class="hero">
        <div class="container" style="display: flex; flex-direction: column; align-items: center;">
            <!-- 3D Logo -->
            <svg class="logo-3d" viewBox="0 0 220 60" fill="none" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#7A3FF2" />
                        <stop offset="100%" stop-color="#9B59FF" />
                    </linearGradient>
                    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#3CA9E2" />
                        <stop offset="100%" stop-color="#6ED0FF" />
                    </linearGradient>
                    <filter id="glossy" x="-20%" y="-20%" width="140%" height="140%">
                        <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
                        <feSpecularLighting result="specOut" in="SourceGraphic" specularConstant="0.8" specularExponent="20" lighting-color="white">
                            <fePointLight x="50" y="20" z="50"/>
                        </feSpecularLighting>
                        <feComposite in="specOut" in2="SourceGraphic" operator="arithmetic" k1="0" k2="1" k3="1" k4="0"/>
                    </filter>
                </defs>
                
                <!-- رمز التكامل (Infinity-style) -->
                <g filter="url(#glossy)">
                    <path d="M30 30 C20 20, 10 20, 10 30 C10 40, 20 40, 30 30 C40 20, 50 20, 50 30 C50 40, 40 40, 30 30" 
                          fill="url(#purpleGrad)" opacity="0.9"/>
                    <circle cx="20" cy="30" r="6" fill="url(#blueGrad)"/>
                    <circle cx="40" cy="30" r="6" fill="url(#blueGrad)"/>
                </g>
                
                <!-- النص OdoNex -->
                <text x="80" y="42" font-family="Tajawal, sans-serif" font-weight="700" font-size="32" fill="#333">Odo</text>
                <text x="130" y="42" font-family="Tajawal, sans-serif" font-weight="700" font-size="32" fill="#4A7BFF">Nex</text>
            </svg>

            <!-- Main Headline -->
            <h1>
                <span class="brand-highlight">OdoNex</span> | حلول ERP الموحدة
            </h1>

            <!-- Subheadline -->
            <div class="subheadline">
                تكامل . أمان . توسع
            </div>

            <!-- Description -->
            <p class="description">
                نظام محاسبي متكامل يجمع جميع عمليات أعمالك في منصة واحدة سهلة وآمنة وقابلة للتوسع.
            </p>

            <!-- CTA Buttons -->
            <div class="cta-buttons">
                <button class="btn-primary">ابدأ تجربتك المجانية</button>
                <button class="btn-secondary">اطلب عرضاً توضيحياً</button>
            </div>
        </div>
    </main>

    <script>
        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            const toggleBtn = document.querySelector('.dark-mode-toggle');
            if (document.body.classList.contains('dark-mode')) {
                toggleBtn.textContent = '☀️';
            } else {
                toggleBtn.textContent = '🌙';
            }
        }
    </script>
</body>
</html>
