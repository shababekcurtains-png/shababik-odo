<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OdoNex | حلول ERP الموحدة</title>
    <!-- Google Fonts - Cairo -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #F1F3FD 0%, #E6FAFF 100%);
            min-height: 100vh;
            color: #333333;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 0 40px;
        }

        /* ===== Navigation Bar ===== */
        .navbar {
            background: white;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            height: 80px;
            display: flex;
            align-items: center;
            position: relative;
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        /* Left side - Language and Dark Mode */
        .nav-left {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        /* Language Button with Globe - Outlined */
        .lang-container {
            display: flex;
            align-items: center;
            gap: 8px;
            border: 2px solid #ddd;
            border-radius: 10px;
            padding: 8px 16px;
            background: transparent;
        }

        .lang-text {
            font-family: 'Cairo', sans-serif;
            font-size: 16px;
            font-weight: 500;
            color: #555;
        }

        .globe-icon {
            width: 20px;
            height: 20px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="%23555" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="12" y1="2" x2="12" y2="22"/></svg>');
            background-size: contain;
        }

        /* Dark Mode Toggle - Outlined like language button */
        .dark-mode-container {
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #ddd;
            border-radius: 10px;
            padding: 8px 12px;
            background: transparent;
            cursor: pointer;
        }

        .dark-mode-toggle {
            background: transparent;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: #333;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Centered Navigation Menu */
        .nav-menu {
            display: flex;
            gap: 40px;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        .nav-menu a {
            text-decoration: none;
            font-family: 'Cairo', sans-serif;
            font-size: 18px;
            font-weight: 500;
            color: #6B6B6B;
            transition: color 0.3s;
        }

        .nav-menu a:hover,
        .nav-menu a.active {
            color: #7A5AF8;
            font-weight: 600;
        }

        /* Right side - Logo */
        .nav-right {
            display: flex;
            align-items: center;
        }

        .nav-logo-img {
            height: 45px;
            width: auto;
        }

        /* ===== Hero Section ===== */
        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            margin-top: 60px;
            padding-bottom: 80px;
        }

        /* Logo with Bouncing Animation */
        @keyframes gentleBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        .hero-logo {
            width: 280px;
            height: auto;
            margin-bottom: 25px;
            filter: drop-shadow(0 20px 25px rgba(122,90,248,0.3));
            animation: gentleBounce 3.5s ease-in-out infinite;
        }

        /* Main Headline - Very Large and Bold */
        h1 {
            font-family: 'Cairo', sans-serif;
            font-size: 58px;
            font-weight: 700;
            line-height: 1.3;
            color: #333333;
            margin-bottom: 15px;
            letter-spacing: -0.5px;
        }

        .brand-gradient {
            background: linear-gradient(135deg, #7A5AF8, #2BB0ED);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 700;
            display: inline-block;
        }

        /* Subheadline - Larger */
        .subheadline {
            font-family: 'Cairo', sans-serif;
            font-size: 28px;
            font-weight: 500;
            color: #6A6A6A;
            letter-spacing: 1.5px;
            margin-bottom: 25px;
        }

        /* Description - Larger */
        .description {
            font-family: 'Cairo', sans-serif;
            font-size: 20px;
            font-weight: 400;
            line-height: 1.8;
            color: #8A8A8A;
            max-width: 800px;
            margin: 0 auto 40px;
        }

        /* CTA Buttons - Side by side */
        .cta-buttons {
            display: flex;
            gap: 25px;
            justify-content: center;
            align-items: center;
        }

        .btn-primary {
            background: linear-gradient(135deg, #7A5AF8 0%, #2BB0ED 100%);
            color: white;
            font-family: 'Cairo', sans-serif;
            font-size: 18px;
            font-weight: 600;
            padding: 16px 32px;
            border-radius: 14px;
            border: none;
            cursor: pointer;
            box-shadow: 0 10px 22px rgba(122,90,248,0.3);
            transition: transform 0.3s, box-shadow 0.3s;
            min-width: 200px;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 28px rgba(122,90,248,0.4);
        }

        .btn-secondary {
            background: transparent;
            border: 2px solid #7A5AF8;
            color: #7A5AF8;
            font-family: 'Cairo', sans-serif;
            font-size: 18px;
            font-weight: 600;
            padding: 16px 32px;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.3s;
            min-width: 200px;
        }

        .btn-secondary:hover {
            background: #7A5AF8;
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(122,90,248,0.2);
        }

        /* ===== Dark Mode Styles ===== */
        body.dark-mode {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #f0f0f0;
        }

        body.dark-mode .navbar {
            background: #222;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }

        body.dark-mode .nav-menu a {
            color: #ccc;
        }

        body.dark-mode .nav-menu a:hover,
        body.dark-mode .nav-menu a.active {
            color: #9B59FF;
        }

        body.dark-mode .lang-container {
            border-color: #444;
        }

        body.dark-mode .lang-text {
            color: #ddd;
        }

        body.dark-mode .globe-icon {
            filter: invert(0.8);
        }

        body.dark-mode .dark-mode-container {
            border-color: #444;
        }

        body.dark-mode .dark-mode-toggle {
            color: #fff;
        }

        body.dark-mode h1 {
            color: #f0f0f0;
        }

        body.dark-mode .subheadline {
            color: #ccc;
        }

        body.dark-mode .description {
            color: #aaa;
        }

        /* ===== Responsive ===== */
        @media (max-width: 992px) {
            .nav-menu {
                position: static;
                transform: none;
                margin: 0 auto;
                gap: 25px;
            }
            
            .nav-container {
                flex-wrap: wrap;
                justify-content: center;
                gap: 15px;
            }
            
            h1 {
                font-size: 48px;
            }
        }

        @media (max-width: 768px) {
            .nav-menu {
                gap: 20px;
                flex-wrap: wrap;
                justify-content: center;
            }
            
            .hero {
                margin-top: 40px;
            }
            
            h1 {
                font-size: 42px;
            }
            
            .subheadline {
                font-size: 24px;
            }
            
            .description {
                font-size: 18px;
            }
            
            .cta-buttons {
                flex-direction: column;
                gap: 15px;
            }
            
            .btn-primary,
            .btn-secondary {
                width: 100%;
                max-width: 280px;
                padding: 14px 28px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container nav-container">
            <!-- Left side - Language and Dark Mode -->
            <div class="nav-left">
                <div class="lang-container">
                    <span class="lang-text">EN</span>
                    <div class="globe-icon"></div>
                </div>
                <div class="dark-mode-container" onclick="toggleDarkMode()">
                    <span class="dark-mode-toggle">🌙</span>
                </div>
            </div>

            <!-- Centered Navigation Menu -->
            <div class="nav-menu">
                <a href="#" class="active">الرئيسية</a>
                <a href="#">المميزات</a>
                <a href="#">الأسعار</a>
                <a href="#">معرض الأعمال</a>
                <a href="#">اتصل بنا</a>
            </div>

            <!-- Right side - Logo Image -->
            <div class="nav-right">
                <img src="assets/images/odonex-logo.png.png" alt="OdoNex" class="nav-logo-img">
            </div>
        </div>
    </nav>

    <main class="hero">
        <div class="container" style="display: flex; flex-direction: column; align-items: center;">
            <!-- Logo Image from uploaded file -->
            <img src="assets/images/odonex-logo.png.png" alt="OdoNex" class="hero-logo">

            <!-- Main Headline with gradient on OdoNex -->
            <h1>
                <span class="brand-gradient">OdoNex</span> | حلول ERP الموحدة
            </h1>

            <!-- Subheadline -->
            <div class="subheadline">
                تكامل . أمان . توسع
            </div>

            <!-- Description -->
            <p class="description">
                نظام محاسبي متكامل يجمع جميع عمليات أعمالك في منصة واحدة سهلة وآمنة وقابلة للتوسع.
            </p>

            <!-- CTA Buttons -->
            <div class="cta-buttons">
                <button class="btn-primary">ابدأ تجربتك المجانية</button>
                <button class="btn-secondary">اطلب عرضاً توضيحياً</button>
            </div>
        </div>
    </main>

    <script>
        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            const toggleBtn = document.querySelector('.dark-mode-toggle');
            if (document.body.classList.contains('dark-mode')) {
                toggleBtn.textContent = '☀️';
            } else {
                toggleBtn.textContent = '🌙';
            }
        }
    </script>
</body>
</html>
