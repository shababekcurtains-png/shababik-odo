<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OdoNex | حلول ERP الموحدة</title>
    <!-- Google Fonts - Cairo -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #F1F3FD 0%, #E6FAFF 100%);
            min-height: 100vh;
            color: #333333;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 0 40px;
        }

        /* ===== Navigation Bar ===== */
        .navbar {
            background: white;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            height: 70px; /* تصغير الارتفاع */
            display: flex;
            align-items: center;
            position: relative;
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        /* Right side - Logo and OdoNex text */
        .nav-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-logo-img {
            height: 35px; /* تصغير الشعار */
            width: auto;
        }

        .nav-logo-text {
            font-family: 'Cairo', sans-serif;
            font-size: 18px;
            font-weight: 700;
            color: #000000; /* أسود خالص */
        }

        /* Centered Navigation Menu */
        .nav-menu {
            display: flex;
            gap: 35px; /* تقليل المسافة قليلاً */
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        .nav-menu a {
            text-decoration: none;
            font-family: 'Cairo', sans-serif;
            font-size: 16px; /* تصغير الخط */
            font-weight: 500;
            color: #6B6B6B;
            transition: color 0.3s;
        }

        .nav-menu a:hover,
        .nav-menu a.active {
            color: #7A5AF8;
            font-weight: 600;
        }

        /* Left side - Language and Dark Mode */
        .nav-left {
            display: flex;
            gap: 12px; /* تقليل المسافة */
            align-items: center;
        }

        /* Language Button with Globe - Outlined */
        .lang-container {
            display: flex;
            align-items: center;
            gap: 6px;
            border: 2px solid #ddd;
            border-radius: 8px; /* تصغير الانحناء */
            padding: 6px 12px; /* تصغير الحشو */
            background: transparent;
        }

        .lang-text {
            font-family: 'Cairo', sans-serif;
            font-size: 14px; /* تصغير الخط */
            font-weight: 500;
            color: #555;
        }

        .globe-icon {
            width: 18px; /* تصغير الأيقونة */
            height: 18px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="%23555" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="12" y1="2" x2="12" y2="22"/></svg>');
            background-size: contain;
        }

        /* Dark Mode Toggle - Only outline, no yellow */
        .dark-mode-container {
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #ddd;
            border-radius: 8px; /* تصغير الانحناء */
            padding: 6px 10px; /* تصغير الحشو */
            background: transparent;
            cursor: pointer;
        }

        .dark-mode-toggle {
            background: transparent;
            border: none;
            font-size: 16px; /* تصغير الخط */
            cursor: pointer;
            color: #333;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ===== Hero Section ===== */
        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            margin-top: 40px; /* تقليل المسافة العلوية */
            padding-bottom: 60px;
        }

        /* Logo with Bouncing Animation */
        @keyframes gentleBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .hero-logo {
            width: 240px; /* تصغير الشعار قليلاً */
            height: auto;
            margin-bottom: 15px; /* تقليل المسافة */
            filter: drop-shadow(0 15px 20px rgba(122,90,248,0.25));
            animation: gentleBounce 3.5s ease-in-out infinite;
        }

        /* Main Headline - Very Large and Bold */
        h1 {
            font-family: 'Cairo', sans-serif;
            font-size: 58px;
            font-weight: 700;
            line-height: 1.2;
            color: #333333;
            margin-bottom: 8px; /* تقليل المسافة */
            letter-spacing: -0.5px;
        }

        .brand-gradient {
            background: linear-gradient(135deg, #7A5AF8, #2BB0ED);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 700;
            display: inline-block;
        }

        /* Subheadline - Bold Black */
        .subheadline {
            font-family: 'Cairo', sans-serif;
            font-size: 28px;
            font-weight: 700; /* بولد */
            color: #000000; /* أسود */
            letter-spacing: 1px;
            margin-bottom: 12px; /* تقليل المسافة */
        }

        /* Description */
        .description {
            font-family: 'Cairo', sans-serif;
            font-size: 20px;
            font-weight: 400;
            line-height: 1.7;
            color: #8A8A8A;
            max-width: 800px;
            margin: 0 auto 25px; /* تقليل المسافة */
        }

        /* CTA Buttons - Side by side */
        .cta-buttons {
            display: flex;
            gap: 20px; /* تقليل المسافة */
            justify-content: center;
            align-items: center;
        }

        .btn-primary {
            background: linear-gradient(135deg, #7A5AF8 0%, #2BB0ED 100%);
            color: white;
            font-family: 'Cairo', sans-serif;
            font-size: 18px;
            font-weight: 600;
            padding: 14px 28px; /* تصغير الحشو */
            border-radius: 12px; /* تصغير الانحناء */
            border: none;
            cursor: pointer;
            box-shadow: 0 8px 18px rgba(122,90,248,0.25);
            transition: transform 0.3s, box-shadow 0.3s;
            min-width: 180px; /* تصغير العرض الأدنى */
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(122,90,248,0.35);
        }

        .btn-secondary {
            background: transparent;
            border: 2px solid #7A5AF8;
            color: #7A5AF8;
            font-family: 'Cairo', sans-serif;
            font-size: 18px;
            font-weight: 600;
            padding: 14px 28px; /* تصغير الحشو */
            border-radius: 12px; /* تصغير الانحناء */
            cursor: pointer;
            transition: all 0.3s;
            min-width: 180px; /* تصغير العرض الأدنى */
        }

        .btn-secondary:hover {
            background: #7A5AF8;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(122,90,248,0.2);
        }

        /* ===== Dark Mode Styles ===== */
        body.dark-mode {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #f0f0f0;
        }

        body.dark-mode .navbar {
            background: #222;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }

        body.dark-mode .nav-menu a {
            color: #ccc;
        }

        body.dark-mode .nav-menu a:hover,
        body.dark-mode .nav-menu a.active {
            color: #9B59FF;
        }

        body.dark-mode .lang-container {
            border-color: #444;
        }

        body.dark-mode .lang-text {
            color: #ddd;
        }

        body.dark-mode .globe-icon {
            filter: invert(0.8);
        }

        body.dark-mode .dark-mode-container {
            border-color: #444;
        }

        body.dark-mode .dark-mode-toggle {
            color: #fff;
        }

        body.dark-mode .nav-logo-text {
            color: #ffffff; /* في الوضع الداكن يصبح أبيض */
        }

        body.dark-mode h1 {
            color: #f0f0f0;
        }

        body.dark-mode .subheadline {
            color: #ffffff; /* في الوضع الداكن يصبح أبيض */
        }

        body.dark-mode .description {
            color: #aaa;
        }

        /* ===== Responsive ===== */
        @media (max-width: 992px) {
            .nav-menu {
                position: static;
                transform: none;
                margin: 0 auto;
                gap: 25px;
            }
            
            .nav-container {
                flex-wrap: wrap;
                justify-content: center;
                gap: 15px;
            }
            
            h1 {
                font-size: 48px;
            }
        }

        @media (max-width: 768px) {
            .nav-menu {
                gap: 20px;
                flex-wrap: wrap;
                justify-content: center;
            }
            
            .hero {
                margin-top: 30px;
            }
            
            h1 {
                font-size: 42px;
            }
            
            .subheadline {
                font-size: 24px;
            }
            
            .description {
                font-size: 18px;
            }
            
            .cta-buttons {
                flex-direction: column;
                gap: 15px;
            }
            
            .btn-primary,
            .btn-secondary {
                width: 100%;
                max-width: 260px;
                padding: 12px 24px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container nav-container">
            <!-- Right side - Logo Image and OdoNex Text -->
            <div class="nav-right">
                <img src="assets/images/odonex-logo.png.png" alt="OdoNex" class="nav-logo-img">
                <span class="nav-logo-text">OdoNex</span>
            </div>

            <!-- Centered Navigation Menu -->
            <div class="nav-menu">
                <a href="#" class="active">الرئيسية</a>
                <a href="#">المميزات</a>
                <a href="#">الأسعار</a>
                <a href="#">معرض الأعمال</a>
                <a href="#">اتصل بنا</a>
            </div>

            <!-- Left side - Language and Dark Mode -->
            <div class="nav-left">
                <div class="lang-container">
                    <span class="lang-text">EN</span>
                    <div class="globe-icon"></div>
                </div>
                <div class="dark-mode-container" onclick="toggleDarkMode()">
                    <span class="dark-mode-toggle">🌙</span>
                </div>
            </div>
        </div>
    </nav>

    <main class="hero">
        <div class="container" style="display: flex; flex-direction: column; align-items: center;">
            <!-- Logo Image from uploaded file -->
            <img src="assets/images/odonex-logo.png.png" alt="OdoNex" class="hero-logo">

            <!-- Main Headline with gradient on OdoNex -->
            <h1>
                <span class="brand-gradient">OdoNex</span> | حلول ERP الموحدة
            </h1>

            <!-- Subheadline - Bold Black -->
            <div class="subheadline">
                تكامل . أمان . توسع
            </div>

            <!-- Description -->
            <p class="description">
                نظام محاسبي متكامل يجمع جميع عمليات أعمالك في منصة واحدة سهلة وآمنة وقابلة للتوسع.
            </p>

            <!-- CTA Buttons -->
            <div class="cta-buttons">
                <button class="btn-primary">ابدأ تجربتك المجانية</button>
                <button class="btn-secondary">اطلب عرضاً توضيحياً</button>
            </div>
        </div>
    </main>

    <script>
        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            const toggleBtn = document.querySelector('.dark-mode-toggle');
            if (document.body.classList.contains('dark-mode')) {
                toggleBtn.textContent = '☀️';
            } else {
                toggleBtn.textContent = '🌙';
            }
        }
    </script>
</body>
</html>
