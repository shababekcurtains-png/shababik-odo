<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OdoNex | تسجيل الدخول - لوحة التحكم</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
        }
        
        :root {
            --odo-purple: #9C27B0;
            --next-blue: #29B6F6;
            --primary-dark: #1A4E8B;
            --accent-gold: #FFD700;
        }
        
        body {
            background: linear-gradient(135deg, var(--primary-dark), var(--odo-purple));
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        
        /* خلفية متحركة */
        .bg-shapes {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        
        .shape {
            position: absolute;
            background: rgba(255,255,255,0.05);
            border-radius: 50%;
            animation: float 20s infinite;
        }
        
        .shape1 {
            width: 300px;
            height: 300px;
            top: -150px;
            right: -150px;
        }
        
        .shape2 {
            width: 200px;
            height: 200px;
            bottom: -100px;
            left: -100px;
            animation-delay: -5s;
        }
        
        @keyframes float {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(30px, 30px) rotate(120deg); }
            66% { transform: translate(-20px, 20px) rotate(240deg); }
        }
        
        .login-container {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
            width: 90%;
            max-width: 450px;
            padding: 50px 40px;
            position: relative;
            z-index: 10;
            animation: slideUp 0.5s ease;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .logo {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .logo img {
            width: 80px;
            height: 80px;
            margin-bottom: 15px;
        }
        
        .logo h1 {
            font-size: 36px;
            background: linear-gradient(135deg, var(--primary-dark), var(--odo-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .logo p {
            color: #666;
            margin-top: 5px;
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }
        
        .input-wrapper {
            position: relative;
        }
        
        .input-icon {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
            font-size: 20px;
        }
        
        .form-group input {
            width: 100%;
            padding: 15px 50px 15px 20px;
            border: 2px solid #eef2f6;
            border-radius: 16px;
            font-size: 16px;
            transition: all 0.3s;
            background: white;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: var(--odo-purple);
            box-shadow: 0 0 0 4px rgba(156,39,176,0.1);
        }
        
        .remember-forgot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            font-size: 14px;
        }
        
        .remember {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #666;
        }
        
        .forgot-link {
            color: var(--odo-purple);
            text-decoration: none;
        }
        
        .btn-login {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary-dark), var(--odo-purple));
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(156,39,176,0.3);
        }
        
        .btn-login:active {
            transform: translateY(0);
        }
        
        .error-message {
            background: #ffebee;
            color: #c62828;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 14px;
            display: none;
            animation: shake 0.5s;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-5px); }
            40%, 80% { transform: translateX(5px); }
        }
        
        .info-box {
            background: #e3f2fd;
            border-radius: 12px;
            padding: 15px;
            margin-top: 25px;
            font-size: 13px;
            color: #0d47a1;
            text-align: center;
        }
        
        .info-box strong {
            color: var(--odo-purple);
        }
    </style>
</head>
<body>
    <div class="bg-shapes">
        <div class="shape shape1"></div>
        <div class="shape shape2"></div>
    </div>
    
    <div class="login-container">
        <div class="logo">
            <img src="../assets/images/odonex-symbol.svg" alt="OdoNex">
            <h1>Odo<span>Nex</span></h1>
            <p>لوحة التحكم الإدارية</p>
        </div>
        
        <div class="error-message" id="errorMessage">
            ❌ اسم المستخدم أو كلمة المرور غير صحيحة
        </div>
        
        <form id="loginForm">
            <div class="form-group">
                <label>اسم المستخدم</label>
                <div class="input-wrapper">
                    <span class="input-icon">👤</span>
                    <input type="text" id="username" placeholder="أدخل اسم المستخدم" required autofocus>
                </div>
            </div>
            
            <div class="form-group">
                <label>كلمة المرور</label>
                <div class="input-wrapper">
                    <span class="input-icon">🔒</span>
                    <input type="password" id="password" placeholder="أدخل كلمة المرور" required>
                </div>
            </div>
            
            <div class="remember-forgot">
                <label class="remember">
                    <input type="checkbox"> تذكرني
                </label>
                <a href="#" class="forgot-link">نسيت كلمة المرور؟</a>
            </div>
            
            <button type="submit" class="btn-login">تسجيل الدخول</button>
        </form>
        
        <div class="info-box">
            <strong>معلومات الدخول التجريبية:</strong><br>
            اسم المستخدم: <strong>admin</strong> | كلمة المرور: <strong>OdoNex2026</strong>
        </div>
    </div>
    
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            // التحقق من صحة البيانات
            if (username === 'admin' && password === 'OdoNex2026') {
                // حفظ حالة تسجيل الدخول
                localStorage.setItem('adminLoggedIn', 'true');
                localStorage.setItem('adminUsername', username);
                localStorage.setItem('adminLoginTime', new Date().toISOString());
                
                // توجيه إلى لوحة التحكم
                window.location.href = 'index.html';
            } else {
                document.getElementById('errorMessage').style.display = 'block';
                
                // إخفاء الرسالة بعد 3 ثواني
                setTimeout(() => {
                    document.getElementById('errorMessage').style.display = 'none';
                }, 3000);
            }
        });
        
        // التحقق إذا كان المستخدم مسجل الدخول بالفعل
        if (localStorage.getItem('adminLoggedIn') === 'true') {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
