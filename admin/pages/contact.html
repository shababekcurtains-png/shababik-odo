<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OdoNex | إدارة جهات الاتصال</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
        }
        
        :root {
            --odo-purple: #9C27B0;
            --next-blue: #29B6F6;
            --primary-dark: #1A4E8B;
            --accent-gold: #FFD700;
            --bg-light: #F8F9FA;
        }
        
        body {
            background: var(--bg-light);
            display: flex;
        }
        
        .sidebar {
            width: 280px;
            background: linear-gradient(180deg, var(--primary-dark), var(--odo-purple));
            color: white;
            min-height: 100vh;
            position: fixed;
            right: 0;
            top: 0;
        }
        
        .sidebar-header {
            padding: 30px 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .sidebar-header img {
            width: 70px;
            height: 70px;
            margin-bottom: 15px;
        }
        
        .sidebar-header h2 {
            font-size: 28px;
        }
        
        .sidebar-header span {
            color: var(--accent-gold);
        }
        
        .sidebar-menu {
            padding: 20px;
        }
        
        .menu-item {
            padding: 15px 20px;
            margin: 5px 0;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 12px;
            color: rgba(255,255,255,0.8);
        }
        
        .menu-item:hover,
        .menu-item.active {
            background: rgba(255,255,255,0.15);
            color: white;
        }
        
        .main-content {
            flex: 1;
            margin-right: 280px;
            padding: 30px;
        }
        
        .top-bar {
            background: white;
            padding: 20px 30px;
            border-radius: 20px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .page-title h1 {
            color: #333;
            font-size: 24px;
        }
        
        .user-avatar {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--odo-purple), var(--next-blue));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }
        
        .contact-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }
        
        .contact-card {
            background: white;
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        
        .contact-card h2 {
            color: var(--primary-dark);
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid var(--bg-light);
        }
        
        .contact-field {
            margin-bottom: 20px;
        }
        
        .contact-field label {
            display: block;
            margin-bottom: 8px;
            color: #666;
            font-weight: 600;
            font-size: 14px;
        }
        
        .contact-field input,
        .contact-field textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid var(--bg-light);
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s;
        }
        
        .contact-field input:focus,
        .contact-field textarea:focus {
            outline: none;
            border-color: var(--odo-purple);
        }
        
        .btn-save {
            background: linear-gradient(135deg, var(--odo-purple), var(--next-blue));
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
        }
        
        .map-preview {
            margin-top: 30px;
            border-radius: 16px;
            overflow: hidden;
        }
        
        @media (max-width: 992px) {
            .sidebar {
                width: 80px;
            }
            
            .sidebar .menu-item span {
                display: none;
            }
            
            .main-content {
                margin-right: 80px;
            }
            
            .contact-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <img src="../../assets/images/odonex-symbol.svg" alt="OdoNex">
            <h2>Odo<span>Nex</span></h2>
            <p>لوحة التحكم</p>
        </div>
        
        <div class="sidebar-menu">
            <div class="menu-item" onclick="window.location.href='../index.html'">
                <i>📊</i>
                <span>الرئيسية</span>
            </div>
            <div class="menu-item" onclick="window.location.href='features.html'">
                <i>✨</i>
                <span>المميزات</span>
            </div>
            <div class="menu-item" onclick="window.location.href='gallery.html'">
                <i>🖼️</i>
                <span>معرض الأعمال</span>
            </div>
            <div class="menu-item" onclick="window.location.href='pricing.html'">
                <i>💰</i>
                <span>الأسعار</span>
            </div>
            <div class="menu-item active">
                <i>📞</i>
                <span>جهات الاتصال</span>
            </div>
            <div class="menu-item" onclick="window.location.href='../login.html'">
                <i>🚪</i>
                <span>تسجيل الخروج</span>
            </div>
        </div>
    </div>
    
    <div class="main-content">
        <div class="top-bar">
            <div class="page-title">
                <h1>إدارة جهات الاتصال</h1>
                <p>تحديث معلومات التواصل والعنوان</p>
            </div>
            <div class="user-avatar">A</div>
        </div>
        
        <div class="contact-grid">
            <!-- معلومات الاتصال -->
            <div class="contact-card">
                <h2>معلومات الاتصال</h2>
                
                <div class="contact-field">
                    <label>الشخص المسؤول (عربي)</label>
                    <input type="text" value="د. أحمد الفارسي" id="contactPersonAr">
                </div>
                
                <div class="contact-field">
                    <label>الشخص المسؤول (إنجليزي)</label>
                    <input type="text" value="Dr. Ahmed Al-Farsi" id="contactPersonEn">
                </div>
                
                <div class="contact-field">
                    <label>المسمى الوظيفي (عربي)</label>
                    <input type="text" value="كبير مسؤولي التكنولوجيا" id="contactTitleAr">
                </div>
                
                <div class="contact-field">
                    <label>المسمى الوظيفي (إنجليزي)</label>
                    <input type="text" value="Chief Technology Officer" id="contactTitleEn">
                </div>
                
                <div class="contact-field">
                    <label>رقم الهاتف الرئيسي</label>
                    <input type="text" value="+966 50 123 4567" id="contactPhone">
                </div>
                
                <div class="contact-field">
                    <label>رقم الهاتف الثاني</label>
                    <input type="text" value="+966 11 234 5678" id="contactPhone2">
                </div>
                
                <div class="contact-field">
                    <label>البريد الإلكتروني</label>
                    <input type="email" value="info@odonex.com" id="contactEmail">
                </div>
                
                <div class="contact-field">
                    <label>البريد الإلكتروني للدعم</label>
                    <input type="email" value="support@odonex.com" id="contactSupport">
                </div>
                
                <button class="btn-save" onclick="saveContactInfo()">حفظ معلومات الاتصال</button>
            </div>
            
            <!-- العنوان والخريطة -->
            <div class="contact-card">
                <h2>العنوان والموقع</h2>
                
                <div class="contact-field">
                    <label>العنوان (عربي)</label>
                    <textarea rows="3" id="addressAr">الرياض - حي الملقا - شارع التخصصي\nالمملكة العربية السعودية</textarea>
                </div>
                
                <div class="contact-field">
                    <label>العنوان (إنجليزي)</label>
                    <textarea rows="3" id="addressEn">Riyadh - Al Malqa District\nSaudi Arabia</textarea>
                </div>
                
                <div class="contact-field">
                    <label>صندوق البريد</label>
                    <input type="text" value="ص.ب 12345, الرياض 11564" id="poBox">
                </div>
                
                <div class="contact-field">
                    <label>إحداثيات الخريطة (Google Maps Embed URL)</label>
                    <input type="text" value="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3625.2925!2d46.6753!3d24.7136" id="mapUrl">
                </div>
                
                <div class="map-preview">
                    <iframe 
                        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3625.2925!2d46.6753!3d24.7136" 
                        width="100%" 
                        height="200" 
                        style="border:0;" 
                        allowfullscreen="" 
                        loading="lazy">
                    </iframe>
                </div>
                
                <button class="btn-save" onclick="saveAddress()" style="margin-top: 20px;">حفظ العنوان</button>
            </div>
        </div>
        
        <!-- ساعات العمل -->
        <div class="contact-card" style="margin-top: 30px;">
            <h2>ساعات العمل</h2>
            
            <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px;">
                <div class="contact-field">
                    <label>أيام العمل (عربي)</label>
                    <input type="text" value="الأحد - الخميس" id="workDaysAr">
                </div>
                
                <div class="contact-field">
                    <label>أيام العمل (إنجليزي)</label>
                    <input type="text" value="Sunday - Thursday" id="workDaysEn">
                </div>
                
                <div class="contact-field">
                    <label>ساعات العمل (عربي)</label>
                    <input type="text" value="9:00 صباحاً - 6:00 مساءً" id="workHoursAr">
                </div>
                
                <div class="contact-field">
                    <label>ساعات العمل (إنجليزي)</label>
                    <input type="text" value="9:00 AM - 6:00 PM" id="workHoursEn">
                </div>
                
                <div class="contact-field">
                    <label>عطلة نهاية الأسبوع (عربي)</label>
                    <input type="text" value="الجمعة - السبت" id="weekendAr">
                </div>
                
                <div class="contact-field">
                    <label>عطلة نهاية الأسبوع (إنجليزي)</label>
                    <input type="text" value="Friday - Saturday" id="weekendEn">
                </div>
            </div>
            
            <button class="btn-save" onclick="saveWorkingHours()">حفظ ساعات العمل</button>
        </div>
    </div>
    
    <script>
        function saveContactInfo() {
            const contactData = {
                personAr: document.getElementById('contactPersonAr').value,
                personEn: document.getElementById('contactPersonEn').value,
                titleAr: document.getElementById('contactTitleAr').value,
                titleEn: document.getElementById('contactTitleEn').value,
                phone: document.getElementById('contactPhone').value,
                phone2: document.getElementById('contactPhone2').value,
                email: document.getElementById('contactEmail').value,
                support: document.getElementById('contactSupport').value
            };
            
            console.log('تم حفظ معلومات الاتصال:', contactData);
            alert('تم حفظ معلومات الاتصال بنجاح');
        }
        
        function saveAddress() {
            const addressData = {
                addressAr: document.getElementById('addressAr').value,
                addressEn: document.getElementById('addressEn').value,
                poBox: document.getElementById('poBox').value,
                mapUrl: document.getElementById('mapUrl').value
            };
            
            console.log('تم حفظ العنوان:', addressData);
            alert('تم حفظ العنوان بنجاح');
        }
        
        function saveWorkingHours() {
            const hoursData = {
                daysAr: document.getElementById('workDaysAr').value,
                daysEn: document.getElementById('workDaysEn').value,
                hoursAr: document.getElementById('workHoursAr').value,
                hoursEn: document.getElementById('workHoursEn').value,
                weekendAr: document.getElementById('weekendAr').value,
                weekendEn: document.getElementById('weekendEn').value
            };
            
            console.log('تم حفظ ساعات العمل:', hoursData);
            alert('تم حفظ ساعات العمل بنجاح');
        }
    </script>
</body>
</html>
